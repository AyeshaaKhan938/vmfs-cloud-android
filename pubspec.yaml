name: vmfs_cloud_mobile
description: VMFS USA Cloud — cross-platform mobile admin for vending operations.
publish_to: 'none'
version: 2.0.0+10

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  dio: ^5.7.0
  go_router: ^14.6.2
  flutter_secure_storage: ^9.2.4
  intl: ^0.20.2
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/vmfs-logo.jpg
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/images/vmfs-logo.jpg
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/vmfs-logo.jpg
